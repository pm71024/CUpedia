version: 2
updates:
  - package-ecosystem: npm
    directory: /CUpedia
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    allow:
      - dependency-type: all
        update-type: "security"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    allow:
      - dependency-type: all
        update-type: "security"
