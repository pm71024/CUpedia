name: CI

on:
  push:
    branches: [main]
    paths: ['CUpedia/**']
  pull_request:
    branches: [main]
    paths: ['CUpedia/**']

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: CUpedia

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: CUpedia/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
        name: Lint

      - run: pnpm test
        name: Test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: CUpedia/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        name: Build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: ci-placeholder-secret
          AUTH_URL: http://localhost:3000
