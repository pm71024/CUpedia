name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
        name: Lint

      - run: pnpm test
        name: Test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        name: Build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: ci-placeholder-secret
          AUTH_URL: http://localhost:3000

  # Non-blocking gate (not in branch-protection required checks yet): runs the
  # Playwright suite against the same zhparser Postgres the dev stack uses, so
  # cross-spec regressions (e.g. the #90 H1 break) surface on every PR. Promote
  # to required once it proves stable.
  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/cuclaw
      AUTH_SECRET: ci-placeholder-secret
      AUTH_URL: http://localhost:3100
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: cuclaw-uploads
      MINIO_PUBLIC_URL: http://localhost:9000/cuclaw-uploads
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start Postgres and MinIO
        run: docker compose up -d --wait db minio

      - name: Create uploads bucket
        run: docker compose run --rm createbuckets

      # global-setup provisions the isolated `cuclaw_e2e` db (create + zhparser
      # + migrate + seed), so no separate migrate step is needed here.

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
