<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>书院院徽标准化预览</title>
    <style>
      body { margin: 0; padding: 40px; color: #242321; background: #f7f6f3; font: 14px/1.5 system-ui, sans-serif; }
      h1 { margin: 0 0 24px; font-size: 24px; }
      main { display: grid; grid-template-columns: repeat(3, minmax(160px, 1fr)); gap: 12px; max-width: 760px; }
      figure { margin: 0; padding: 24px; text-align: center; border: 1px solid #e7e5e1; border-radius: 10px; background: white; }
      img { display: block; width: 96px; height: 96px; margin: 0 auto 14px; }
      figcaption { font-weight: 600; }
      small { display: block; color: #787774; font-weight: 400; }
      @media (max-width: 600px) { body { padding: 20px; } main { grid-template-columns: repeat(2, 1fr); } }
    </style>
  </head>
  <body>
    <h1>九所书院院徽 · 64×64 SVG</h1>
    <main>
      <figure><img src="../../public/college-crests/cc.svg" alt=""><figcaption>崇基学院<small>CC</small></figcaption></figure>
      <figure><img src="../../public/college-crests/na.svg" alt=""><figcaption>新亚书院<small>NA</small></figcaption></figure>
      <figure><img src="../../public/college-crests/uc.svg" alt=""><figcaption>联合书院<small>UC</small></figcaption></figure>
      <figure><img src="../../public/college-crests/sc.svg" alt=""><figcaption>逸夫书院<small>SC</small></figcaption></figure>
      <figure><img src="../../public/college-crests/mc.svg" alt=""><figcaption>晨兴书院<small>MC</small></figcaption></figure>
      <figure><img src="../../public/college-crests/shho.svg" alt=""><figcaption>善衡书院<small>SHHO</small></figcaption></figure>
      <figure><img src="../../public/college-crests/cwc.svg" alt=""><figcaption>敬文书院<small>CWC</small></figcaption></figure>
      <figure><img src="../../public/college-crests/wys.svg" alt=""><figcaption>伍宜孙书院<small>WYS</small></figcaption></figure>
      <figure><img src="../../public/college-crests/lws.svg" alt=""><figcaption>和声书院<small>LWS</small></figcaption></figure>
    </main>
  </body>
</html>
