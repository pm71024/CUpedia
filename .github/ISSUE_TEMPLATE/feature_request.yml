name: Feature Request
description: Suggest a new feature for CUpedia.
type: Feature
body:
  - type: textarea
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: How should it work? Include mockups or examples if possible.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.
    validations:
      required: false
